name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [DEV]

permissions:
  contents: write

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────
  check:
    name: Lint & Type Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

  # ── Build (Windows) ────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend deps
        run: npm ci

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      # Install Tauri dependencies (Windows)
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      # Build the Tauri app
      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # Upload artifacts
      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: ultimate-toolkit-windows-${{ github.ref_name }}
          path: src-tauri/target/release/msi/*.msi

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ultimate-toolkit-windows-bundle-${{ github.ref_name }}
          path: src-tauri/target/release/bundle/

  # ── Create Release ─────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download MSI
        uses: actions/download-artifact@v4
        with:
          name: ultimate-toolkit-windows-${{ github.ref_name }}
          path: artifacts/

      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: ultimate-toolkit-windows-bundle-${{ github.ref_name }}
          path: artifacts/bundle/

      - name: Generate release notes
        run: |
          echo "## Ultimate Toolkit ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/ROADMAP.md) for details." >> release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Ultimate Toolkit ${{ github.ref_name }}"
          body_path: release-notes.md
          files: |
            artifacts/*.msi
            artifacts/bundle/**/*
          draft: true
          prerelease: false
